<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Completo</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f9; padding: 20px; }
        .chart-container { width: 90%; max-width: 900px; margin: 20px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background-color: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Dashboard de Ventas</h1>
    <button onclick="actualizarDatos()">Actualizar Datos</button>

    <div class="chart-container">
        <h2>Google Charts: Comparativa</h2>
        <div id="google_chart_div" style="height: 300px;"></div>
    </div>
    
    <div class="chart-container">
        <h2>D3.js: Distribución por Producto</h2>
        <div id="d3_chart_div"></div>
    </div>

    <script>
        let ventasData = [
            {producto: "Smartphone A", enero: 120, febrero: 150},
            {producto: "Smartphone B", enero: 85, febrero: 90},
            {producto: "Tablet X", enero: 60, febrero: 70}
        ];

        const colorMap = { "Smartphone A": "#4285F4", "Smartphone B": "#DB4437", "Tablet X": "#F4B400" };

        function actualizarDatos() {
            ventasData.forEach(d => {
                d.enero = Math.floor(Math.random() * 180) + 20;
                d.febrero = Math.floor(Math.random() * 180) + 20;
            });
            drawGoogleChart();
            drawD3Chart();
        }

        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(drawGoogleChart);

        function drawGoogleChart() {
            const dataTable = new google.visualization.DataTable();
            dataTable.addColumn('string', 'Producto');
            dataTable.addColumn('number', 'Enero');
            dataTable.addColumn('number', 'Febrero');
            ventasData.forEach(d => dataTable.addRow([d.producto, d.enero, d.febrero]));
            
            const options = { title: 'Ventas por Producto', hAxis: {title: 'Producto'}, vAxis: {title: 'Ventas'} };
            const chart = new google.visualization.ColumnChart(document.getElementById('google_chart_div'));
            chart.draw(dataTable, options);
        }

        function drawD3Chart() {
            d3.select("#d3_chart_div").selectAll("svg").remove();
            const svg = d3.select("#d3_chart_div").append("svg").attr("width", 800).attr("height", 350);
            
            // Transformar datos para D3
            const allData = [];
            ventasData.forEach(d => {
                allData.push({p: d.producto, v: d.enero, mes: 'Enero'});
                allData.push({p: d.producto, v: d.febrero, mes: 'Febrero'});
            });

            // Ejes y Etiquetas
            svg.append("text").attr("x", 400).attr("y", 340).style("text-anchor", "middle").text("Mes (Enero / Febrero)");
            svg.append("text").attr("transform", "rotate(-90)").attr("y", 20).attr("x", -150).style("text-anchor", "middle").text("Ventas");

            // Burbujas
            svg.selectAll("circle")
                .data(allData)
                .enter().append("circle")
                .attr("cx", (d, i) => 150 + i * 100)
                .attr("cy", 150)
                .attr("r", d => d.v / 5)
                .attr("fill", d => colorMap[d.p])
                .attr("stroke", "#333");

            // LEYENDA DE PRODUCTOS
            const legend = svg.selectAll(".legend")
                .data(Object.keys(colorMap))
                .enter().append("g")
                .attr("transform", (d, i) => `translate(600, ${50 + i * 25})`);

            legend.append("rect").attr("width", 15).attr("height", 15).attr("fill", d => colorMap[d]);
            legend.append("text").attr("x", 20).attr("y", 12).text(d => d).style("font-size", "12px");
        }
    </script>
</body>
</html>
